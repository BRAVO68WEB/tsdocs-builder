name: CI

on:
 push:
 branches: [main]
 pull_request:

concurrency:
 group: ${{ github.workflow }}-${{ github.ref }}
 cancel-in-progress: true

jobs:
 lint:
  name: Lint
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
      bun-version: latest
    - run: bun install --frozen-lockfile
    - run: bun run lint

 typecheck:
  name: Type Check
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
      bun-version: latest
    - run: bun install --frozen-lockfile
    - run: bun run typecheck

 test:
  name: Test
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
      bun-version: latest
    - run: bun install --frozen-lockfile
    - run: bun run test

 build:
  name: Build
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
      bun-version: latest
    - run: bun install --frozen-lockfile
    - run: bun run build

 publish:
  name: Publish to npm
  runs-on: ubuntu-latest
  needs: [lint, typecheck, test, build]
  # Only publish on version bumps (changesets creates a release PR)
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
      bun-version: latest
    - uses: actions/setup-node@v4
      with:
      node-version: "22"
      registry-url: "https://registry.npmjs.org"
    - run: bun install --frozen-lockfile
    - run: bun add -D @changesets/cli
    - run: bunx changeset version
    - run: bunx changeset publish
      env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
